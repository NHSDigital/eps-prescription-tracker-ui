name: deploy_pr

on:
  pull_request:
    branches: [main]

jobs:
  dependabot-auto-approve-and-merge:
    needs: quality_checks
    uses: NHSDigital/eps-common-workflows/.github/workflows/dependabot-auto-approve-and-merge.yml@d215f841eb18b803e339e4ed597ed1f30e086e17
    secrets:
      AUTOMERGE_APP_ID: ${{ secrets.AUTOMERGE_APP_ID }}
      AUTOMERGE_PEM: ${{ secrets.AUTOMERGE_PEM }}
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@8404cf6e3a61ac8de4d1644e175e288aa4965815
    with:
      verify_published_from_main_image: false

  get_commit_message:
    runs-on: ubuntu-22.04
    outputs:
      commit_message: ${{ steps.commit_message.outputs.commit_message }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Get Commit message
        id: commit_message
        run: |
          echo "commit_message=$(git show -s --format=%s)" >> "$GITHUB_OUTPUT"

  quality_checks:
    # always run, but only block in the non-skip case
    needs: [get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@8404cf6e3a61ac8de4d1644e175e288aa4965815
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality_gate:
    needs: get_commit_message
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Wait for quality checks to succeed
        if: ${{ ! contains(needs.get_commit_message.outputs.commit_message, '#skip-qc') }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: json
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;

            // How many times to poll
            const pollTime = 10000; // 10 seconds
            const maxRetries = 120; // 20 minutes at 10 seconds each
            let attempts = 0;

            async function fetchQCJob() {
              const { data } = await github.rest.actions.listJobsForWorkflowRun({
                owner, repo, run_id: runId
              });
              return data.jobs.find(job => job.name === 'quality_checks / quality_checks');
            }

            let qc = await fetchQCJob();
            while ((!qc || qc.status !== 'completed') && attempts < maxRetries) {
              attempts++;
              console.log(`Attempt #${attempts}: ` +
                (qc
                  ? `found job “${qc.name}” with status=${qc.status}`
                  : 'no matching quality_checks job yet'));
              await new Promise(r => setTimeout(r, pollTime));
              qc = await fetchQCJob();
            }

            if (!qc) {
              core.setFailed(
                `Timed out waiting for a “quality_checks” job (after ${attempts} polls).`
              );
              return;
            }

            if (qc.status !== 'completed') {
              core.setFailed(
                `Quality checks job never completed (last status=${qc.status}).`
              );
              return;
            }

            if (qc.conclusion !== 'success') {
              core.setFailed(
                `Quality checks failed (conclusion=${qc.conclusion}).`
              );
            }

      - name: Bypass QC gate
        if: ${{ contains(needs.get_commit_message.outputs.commit_message, '#skip-qc') }}
        run: echo "Skipping QC gate per commit message."

  pr_title_format_check:
    uses: NHSDigital/eps-common-workflows/.github/workflows/pr_title_check.yml@8404cf6e3a61ac8de4d1644e175e288aa4965815

  tag_release:
    needs: [get_config_values, quality_gate]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@8404cf6e3a61ac8de4d1644e175e288aa4965815
    with:
      dry_run: true
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: ${{ github.event.pull_request.head.ref }}
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
    secrets: inherit

  package_code:
    needs: [quality_gate, get_config_values]
    uses: ./.github/workflows/cdk_package_code.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}

  release_code:
    needs: [package_code, get_config_values]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      SERVICE_NAME: cpt-ui-pr-${{ github.event.pull_request.number }}
      TARGET_ENVIRONMENT: dev-pr
      VERSION_NUMBER: PR-${{ github.event.pull_request.number }}
      COMMIT_ID: "static-pr"
      useMockOidc: true
      JWT_KID: "eps-cpt-ui-dev"
      LOG_LEVEL: "DEBUG"
      RUN_REGRESSION_TESTS: true
      REACT_LOG_LEVEL: "debug"
      LOG_RETENTION_IN_DAYS: 30
      IS_PULL_REQUEST: true
    secrets: inherit
  report_deployed_url:
    needs: [release_code]
    runs-on: ubuntu-22.04
    steps:
      - name: Report Deployed URL
        run: |
          echo "Deployed URL: https://cpt-ui-pr-${{ github.event.pull_request.number }}.dev.eps.national.nhs.uk" >> "$GITHUB_STEP_SUMMARY"
