name: deploy to environments

on:
  workflow_dispatch:

jobs:
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    with:
      verify_published_from_main_image: true
  quality_checks:
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    needs: [get_config_values]
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tag_release:
    needs: [quality_checks, get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    permissions:
      id-token: write
      contents: write
    with:
      dry_run: false
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: main
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
      update_jira: true
      jira_release_prefix: "cpt-ui"
    secrets:
      EXECUTE_JIRA_LAMBDA_ROLE: ${{ secrets.DEV_CLOUD_FORMATION_EXECUTE_LAMBDA_ROLE }}

  package_code:
    needs: [tag_release, get_config_values]
    uses: ./.github/workflows/cdk_package_code.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}

  release_dev:
    needs: [tag_release, package_code, get_config_values]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}
      SERVICE_NAME: cpt-ui
      TARGET_ENVIRONMENT: dev
      VERSION_NUMBER: ${{needs.tag_release.outputs.version_tag}}
      COMMIT_ID: ${{github.sha}}
      useMockOidc: true
      JWT_KID: "eps-cpt-ui-dev"
      LOG_LEVEL: "DEBUG"
      REACT_LOG_LEVEL: "debug"
      LOG_RETENTION_IN_DAYS: 30
      IS_PULL_REQUEST: false
    secrets: inherit

  release_ref:
    needs: [tag_release, package_code, get_config_values, release_dev]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}
      SERVICE_NAME: cpt-ui
      TARGET_ENVIRONMENT: ref
      VERSION_NUMBER: ${{needs.tag_release.outputs.version_tag}}
      COMMIT_ID: ${{github.sha}}
      useMockOidc: true
      JWT_KID: "eps-cpt-ui-ref"
      LOG_LEVEL: "DEBUG"
      REACT_LOG_LEVEL: "debug"
      LOG_RETENTION_IN_DAYS: 30
      IS_PULL_REQUEST: false
    secrets: inherit

  release_qa:
    needs: [tag_release, package_code, get_config_values, release_dev]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}
      SERVICE_NAME: cpt-ui
      TARGET_ENVIRONMENT: qa
      VERSION_NUMBER: ${{needs.tag_release.outputs.version_tag}}
      COMMIT_ID: ${{github.sha}}
      useMockOidc: true
      JWT_KID: "eps-cpt-ui-qa"
      LOG_LEVEL: "DEBUG"
      REACT_LOG_LEVEL: "debug"
      LOG_RETENTION_IN_DAYS: 30
      IS_PULL_REQUEST: false
    secrets: inherit
  release_int:
    needs: [tag_release, package_code, get_config_values, release_qa]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}
      SERVICE_NAME: cpt-ui
      TARGET_ENVIRONMENT: int
      VERSION_NUMBER: ${{needs.tag_release.outputs.version_tag}}
      COMMIT_ID: ${{github.sha}}
      useMockOidc: false
      JWT_KID: "eps-cptui-int-2026-03-23"
      LOG_LEVEL: "DEBUG"
      RUN_REGRESSION_TESTS: false
      REACT_LOG_LEVEL: "debug" # change this before pilot
      LOG_RETENTION_IN_DAYS: 30
      IS_PULL_REQUEST: false
    secrets: inherit
  release_prod:
    needs: [tag_release, package_code, get_config_values, release_int]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}
      SERVICE_NAME: cpt-ui
      TARGET_ENVIRONMENT: prod
      VERSION_NUMBER: ${{needs.tag_release.outputs.version_tag}}
      COMMIT_ID: ${{github.sha}}
      useMockOidc: false
      JWT_KID: "eps-cptui-prod-2026-03-23"
      LOG_LEVEL: "DEBUG"
      RUN_REGRESSION_TESTS: false
      REACT_LOG_LEVEL: "debug" # change this before pilot
      LOG_RETENTION_IN_DAYS: 731
      IS_PULL_REQUEST: false
    secrets: inherit
